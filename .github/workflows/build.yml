name: Build CSS

on:
  push:
    paths:
      - 'users.json'
      - 'decorations.json'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Generate CSS
        run: |
          python3 - << 'EOF'
          import json

          css = ""

          with open('users.json') as f:
              avatars = json.load(f)["avatars"]

          for uid, gif in avatars.items():
              css += f'[data-user-id="{uid}"] img[class*="avatar"] {{ content: url("{gif}") !important; }}\n'

          with open('decorations.json') as f:
              decorations = json.load(f)["decorations"]

          for uid, deco in decorations.items():
              css += f'[data-user-id="{uid}"]::before {{ content: url("{deco}") !important; }}\n'

          with open('source.css', 'w') as f:
              f.write(css)
          EOF

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update source.css"
